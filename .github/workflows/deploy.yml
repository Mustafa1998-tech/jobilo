name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SLACK_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

jobs:
  # ── Build and push Docker images ───────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=,suffix=,format=short

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}-backend
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}-frontend
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to staging ──────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-22.04
    needs: [build]
    timeout-minutes: 10
    environment:
      name: staging
      url: https://staging.jobilo.io

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/jobilo
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f

      - name: Health check
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.jobilo.io/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Waiting... ($i/12)"
            sleep 5
          done
          echo "Health check failed!"
          exit 1

  # ── Deploy to production ──────────────────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-22.04
    needs: [deploy-staging]
    timeout-minutes: 10
    environment:
      name: production
      url: https://jobilo.io
    if: github.ref == 'refs/heads/main' && startsWith(github.ref, 'refs/tags/v') == false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/jobilo
            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f

      - name: Health check
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://jobilo.io/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Waiting... ($i/12)"
            sleep 5
          done
          echo "Health check failed! Initiating rollback..."
          exit 1

  # ── Rollback on failure ────────────────────────────────
  rollback:
    name: Rollback deployment
    runs-on: ubuntu-22.04
    needs: [deploy-production]
    timeout-minutes: 5
    if: failure() && needs.deploy-production.result == 'failure'
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/jobilo
            docker compose up -d --remove-orphans

  # ── Slack notification ─────────────────────────────────
  notify:
    name: Notify Slack
    runs-on: ubuntu-22.04
    needs: [deploy-staging, deploy-production]
    if: always()
    timeout-minutes: 2
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "channel": "#deployments",
              "username": "Jobilo Bot",
              "icon_emoji": ":ship:",
              "text": "Deployment `${{ github.sha }}` to `${{ needs.deploy-production.result == 'success' && 'production' || 'staging' }}` — ${{ job.status }}",
              "attachments": [
                {
                  "color": "${{ job.status == 'success' && 'good' || 'danger' }}",
                  "fields": [
                    { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                    { "title": "Author", "value": "${{ github.triggering_actor }}", "short": true },
                    { "title": "Workflow", "value": "${{ github.run_id }}", "short": true }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK }}
